name: delivery_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.5
  
  # Networking & Real-time
  http: ^1.6.0
  socket_io_client: ^3.1.4
  
  # State Management
  provider: ^6.1.1
  
  # Maps & Location
  google_maps_flutter: ^2.5.3
  location: ^5.0.3
  geolocator: ^13.0.1
  
  # Firebase & Notifications (التعديل هون عشان IDX)
  firebase_core: ^3.15.1
  firebase_messaging: ^15.2.10
  flutter_local_notifications: ^17.0.0
  
  # Storage & Utilities
  shared_preferences: ^2.3.3
  intl: ^0.18.1
  flutter_dotenv: ^5.2.1
  url_launcher: ^6.3.1
  
  # UI Components
  badges: ^3.1.2
  fluttertoast: ^8.2.14
  flutter_rating_bar: ^4.0.1
  
  # Audio
  audioplayers: ^6.1.0
  image_picker: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: "^0.13.1"

# إعدادات الأيقونات
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#FFFFFF"

flutter:
  uses-material-design: true

  # تعريف الملفات
  assets:
    - assets/sounds/alert.mp3
    - assets/icon.png
    - assets/logo.jpeg

  # تعريف الخطوط
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter_18pt-Regular.ttf
        - asset: assets/fonts/Inter_18pt-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter_18pt-SemiBold.ttf
          weight: 600